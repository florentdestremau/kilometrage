name: CI

on:
  push:
    branches: ["master", "main"]
    tags: ["v*"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    name: Tests & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install deps
        run: |
          uv venv
          uv pip install \
            fastapi uvicorn[standard] httpx pydantic pydantic-settings \
            anthropic structlog slowapi aiosqlite hatchling \
            pytest pytest-asyncio respx ruff

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Tests
        run: uv run pytest tests/ -v
        env:
          GRAPHHOPPER_API_KEY: "test-key"
          ANTHROPIC_API_KEY: "test-key"
          STORAGE_DIR: "/tmp/test-storage"

  docker:
    name: Build & push Docker
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=master,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
